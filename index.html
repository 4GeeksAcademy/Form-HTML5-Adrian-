<!DOCTYPE html>
<html lang="en">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <div class="container-fluid">
    <div class="row d-flex justify-content-center align-items-center" style="height: 100vh;">
    <div class="col-6">
        <div class="card p-0">
            <div class="card-header">
                <h3>Payment form example</h3>
            </div>
            
            <div class="card-body">
                <div class="alert alert-danger" role="alert">
                    Some fields are missing
                </div>
                <div class="d-flex">
                    <div class="mb-3 flex-grow-1">
                        <label for="card#" class="form-label">Card #</label>
                        <input type="text" class="form-control" id="card#" placeholder="XXXXXXXXXXXXXXXX">
                    </div>
                    <div class="mb-3 mx-4">
                        <label for="cvc" class="form-label">CVC #</label>
                        <input type="text" class="form-control" id="cvc" placeholder="0000" size="30">
                    </div>
                    <div class="mb-3">
                        <label for="amount" class="form-label">Amount</label>
                        <div class="d-flex">
                        <h5 class="align-self-center">$</h5>
                        <input type="text" class="form-control" id="amount" placeholder="Amount" size="40">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="mb-3 col-6">
                        <label for="fname" class="form-label">First Name</label>
                        <input type="text" class="form-control" id="fname">
                    </div>
                    <div class="mb-3 col-6">
                        <label for="lname" class="form-label">Last Name</label>
                        <input type="text" class="form-control" id="lname">
                    </div>
                </div>

                <div class="row">
                    <div class="mb-3 col-6">
                        <label for="inputCity" class="form-label">City</label>
                        <input type="text" class="form-control" id="inputCity">
                    </div>
                    <div class="mb-3 col-3">
                        <label for="inputState" class="form-label">State</label>
                        <select id="inputState" class="form-select">
                        <option selected>Pick a state</option>
                        <option>...</option>
                        </select>
                    </div>
                    <div class="mb-3 col-3">
                        <label for="inputZip" class="form-label">Postal Code</label>
                        <input type="text" class="form-control" id="inputZip">
                    </div>
                </div>

                <div class="row">
                    <div class="col-6">
                    <p>We accept:</p>
                        <div class="btn-group" role="group" aria-label="Basic example">
                            <button type="button" class="btn btn-secondary"><input class="form-check-input me-1" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1"><i class="fa-brands fa-cc-mastercard fs-5" style="color: rgb(255, 255, 255);"></i></button>
                            <button type="button" class="btn btn-secondary"><input class="form-check-input me-1" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2"><i class="fa-brands fa-cc-visa fs-5" style="color: rgb(255, 255, 255);"></i></button>
                            <button type="button" class="btn btn-secondary"><input class="form-check-input me-1" type="radio" name="inlineRadioOptions" id="inlineRadio3" value="option3"><i class="fa-brands fa-cc-diners-club fs-5" style="color: rgb(255, 255, 255);"></i></button>
                            <button type="button" class="btn btn-secondary"><input class="form-check-input me-1" type="radio" name="inlineRadioOptions" id="inlineRadio4" value="option4"><i class="fa-brands fa-cc-amex fs-5" style="color: rgb(255, 255, 255);"></i></button>
                        </div>
                    </div>

                    <div class="col-6">
                        <div class="mb-3">
                            <label for="exampleFormControlTextarea1" class="form-label">Message</label>
                            <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"></textarea>
                            <div id="textarea" class="form-text">Add any notes here.</div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="card-footer text-body-secondary d-flex justify-content-end">
                <button type="button" class="btn btn-secondary me-1">Cancel</button>
                <a href="#" class="btn btn-primary">Send</a>
            </div>
        </div>
    </div>
    </div>
    </div>


    <script src="https://kit.fontawesome.com/8ade12ddaa.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
